<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MoQ Demo</title>
    <link rel="stylesheet" href="index.css" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --bg: #080a0d;
        --surface: #0e1117;
        --border: #1e2530;
        --border-glow: #2a9fff40;
        --text: #dce8f5;
        --muted: #4d6070;
        --accent: #2a9fff;
        --accent-dim: #1a5a99;
        --danger: #e24b4a;
        --success: #1d9e75;
        --mono: "JetBrains Mono", monospace;
        --sans: "Syne", sans-serif;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 2rem 0;
      }

      h3 {
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 1rem;
        display: flex;
        align-items: center;
        gap: 0.6rem;
      }
      h3::before {
        content: "";
        display: inline-block;
        width: 3px;
        height: 14px;
        background: var(--accent);
        border-radius: 2px;
        box-shadow: 0 0 8px var(--accent);
      }

      #video-file {
        display: none;
      }

      .upload-row {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 0.75rem;
        flex-wrap: wrap;
      }

      #upload-pick-btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        height: 38px;
        padding: 0 1.2rem;
        background: transparent;
        border: 1px solid var(--border);
        border-radius: 4px;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.06em;
        cursor: pointer;
        transition:
          border-color 0.2s,
          color 0.2s,
          background 0.2s;
        max-width: 300px;
      }
      #upload-pick-btn:hover {
        border-color: var(--accent-dim);
        color: var(--text);
        background: #ffffff06;
      }
      #upload-pick-btn.has-file {
        border-color: var(--accent-dim);
        color: var(--text);
      }
      #upload-pick-btn.uploading {
        opacity: 0.45;
        pointer-events: none;
      }
      #upload-pick-btn svg {
        width: 14px;
        height: 14px;
        flex-shrink: 0;
        opacity: 0.6;
      }
      #upload-pick-btn.has-file svg {
        opacity: 1;
      }
      #pick-file-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        max-width: 200px;
      }

      #video-upload,
      #video-publish {
        display: none;
        align-items: center;
        gap: 6px;
        height: 38px;
        padding: 0 1.4rem;
        background: transparent;
        border: 1px solid var(--accent-dim);
        border-radius: 4px;
        color: var(--accent);
        font-family: var(--mono);
        font-size: 12px;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        transition:
          color 0.25s,
          border-color 0.25s,
          box-shadow 0.25s;
      }
      #video-upload.visible,
      #video-publish.visible {
        display: inline-flex;
      }
      #video-upload::before,
      #video-publish::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--accent) 50%,
          transparent 100%
        );
        transform: translateX(-110%);
        opacity: 0.15;
        transition: transform 0.45s ease;
      }
      #video-upload:hover,
      #video-publish:hover {
        border-color: var(--accent);
        color: #fff;
        box-shadow:
          0 0 18px var(--border-glow),
          inset 0 0 12px #2a9fff18;
      }
      #video-upload:hover::before,
      #video-publish:hover::before {
        transform: translateX(110%);
      }
      #video-upload:active,
      #video-publish:active {
        transform: scale(0.97);
      }
      #video-upload.uploading,
      #video-publish.uploading {
        opacity: 0.4;
        pointer-events: none;
      }
      #video-upload svg,
      #video-publish svg {
        width: 13px;
        height: 13px;
      }

      #video-publish {
        border-color: #1d9e7540;
        color: var(--success);
      }
      #video-publish::before {
        background: linear-gradient(
          90deg,
          transparent 0%,
          var(--success) 50%,
          transparent 100%
        );
      }
      #video-publish:hover {
        border-color: var(--success);
        box-shadow:
          0 0 18px #1d9e7540,
          inset 0 0 12px #1d9e7518;
      }

      #video-upload-status {
        font-family: var(--mono);
        font-size: 11px;
        letter-spacing: 0.06em;
        color: var(--muted);
        min-height: 18px;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }
      #video-upload-status.success {
        color: var(--success);
      }
      #video-upload-status.error {
        color: var(--danger);
      }

      .table-wrap {
        overflow-x: auto;
        min-width: 730px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        overflow: hidden;
        display: inline-table;
      }

      #video-table {
        width: 100%;
        border-collapse: collapse;
        font-family: var(--mono);
        font-size: 12px;
      }

      #video-table thead {
        border-bottom: 1px solid var(--border);
      }
      #video-table thead th {
        padding: 0.6rem 1rem;
        text-align: left;
        font-family: var(--sans);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        color: var(--muted);
        white-space: nowrap;
        background: #0a0d12;
      }

      #video-table tbody tr {
        border-bottom: 1px solid var(--border);
        transition: background 0.12s;
      }
      #video-table tbody tr:last-child {
        border-bottom: none;
      }
      #video-table tbody tr:hover {
        background: #2a9fff08;
      }

      #video-table tbody td {
        padding: 0.65rem 1rem;
        color: var(--text);
        vertical-align: middle;
        white-space: nowrap;
      }

      #video-table tbody td.td-name {
        color: #fff;
        font-weight: 500;
      }
      #video-table tbody td.td-meta {
        color: var(--muted);
        font-size: 11px;
      }
      #video-table tbody td.td-path {
        color: var(--accent);
        font-size: 11px;
        max-width: 220px;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .actions {
        display: flex;
        gap: 6px;
        align-items: center;
      }

      .icon-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 28px;
        height: 28px;
        border-radius: 5px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s,
          color 0.15s;
        flex-shrink: 0;
      }
      .icon-btn svg {
        width: 13px;
        height: 13px;
      }

      .icon-btn.play:hover {
        border-color: var(--accent);
        color: var(--accent);
        background: #2a9fff14;
      }
      .icon-btn.copy:hover {
        border-color: var(--success);
        color: var(--success);
        background: #1d9e7514;
      }
      .icon-btn.del:hover {
        border-color: var(--danger);
        color: var(--danger);
        background: #e24b4a14;
      }

      .empty-row td {
        text-align: center;
        padding: 2rem 1rem;
        color: var(--muted);
        font-family: var(--mono);
        font-size: 12px;
        letter-spacing: 0.05em;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: var(--bg);
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--accent-dim);
      }

      /* --- Minimal global transport (sole player chrome; no moq-watch-ui) --- */
      .demo-player-chrome {
        display: flex;
        justify-content: center;
        margin-top: 1rem;
      }

      .demo-player-chrome__rail {
        display: inline-flex;
        flex: 1 1 260px;
        align-items: center;
        flex-wrap: wrap;
        justify-content: center;
        gap: 0.35rem;
        min-width: 0;
        padding: 0.45rem 0.55rem;
        border-radius: 999px;
        background: #06080c;
        border: 1px solid var(--border);
        box-shadow:
          inset 0 1px 0 #ffffff08,
          0 10px 28px #00000066;
      }

      .demo-player-chrome__divider {
        width: 1px;
        height: 1.5rem;
        margin: 0 0.2rem;
        background: var(--border);
        flex-shrink: 0;
      }

      .demo-tbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 2.65rem;
        height: 2.65rem;
        border: none;
        border-radius: 999px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        transition:
          color 0.15s,
          background 0.15s,
          transform 0.12s;
      }

      .demo-tbtn:hover:not(:disabled) {
        color: var(--text);
        background: #ffffff08;
      }

      .demo-tbtn:active:not(:disabled) {
        transform: scale(0.94);
      }

      .demo-tbtn svg {
        width: 1.15rem;
        height: 1.15rem;
        flex-shrink: 0;
      }

      .demo-tbtn:disabled {
        opacity: 0.32;
        cursor: not-allowed;
        transform: none;
      }

      .demo-tbtn--play {
        width: 3rem;
        height: 3rem;
        background: linear-gradient(
          145deg,
          var(--accent) 0%,
          var(--accent-dim) 100%
        );
        color: #fff;
        box-shadow:
          0 0 0 1px #ffffff22,
          0 8px 22px var(--border-glow);
      }

      .demo-tbtn--play:hover:not(:disabled) {
        color: #fff;
        background: linear-gradient(145deg, #3babff 0%, #1f6ebe 100%);
        box-shadow:
          0 0 0 1px #ffffff30,
          0 10px 26px #2a9fff55;
      }

      .demo-tbtn--play:disabled {
        opacity: 0.4;
      }

      .demo-tbtn--pause:hover:not(:disabled) {
        color: var(--accent);
        background: #2a9fff14;
      }

      .demo-tbtn--stop:hover:not(:disabled) {
        color: var(--danger);
        background: #e24b4a14;
      }

      .demo-tbtn--fs[data-fs="true"] {
        color: var(--accent);
        background: #2a9fff12;
      }

      .demo-tbtn--fs .demo-tbtn__fs-exit {
        display: none;
      }

      .demo-tbtn--fs[data-fs="true"] .demo-tbtn__fs-enter {
        display: none;
      }

      .demo-tbtn--fs[data-fs="true"] .demo-tbtn__fs-exit {
        display: block;
      }

      .demo-player-chrome__inner {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 0.65rem 1rem;
        width: 100%;
      }

      .demo-live-status {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        padding: 0.35rem 0.75rem;
        min-height: 2.65rem;
        border-radius: 999px;
        background: #06080c;
        border: 1px solid var(--border);
        font-family: var(--mono);
        font-size: 11px;
        font-weight: 500;
        letter-spacing: 0.06em;
        color: var(--text);
      }

      .demo-live-status__dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
        background: var(--muted);
      }

      .demo-live-status--error .demo-live-status__dot {
        background: var(--danger);
        box-shadow: 0 0 8px #e24b4a55;
      }

      .demo-live-status--connecting .demo-live-status__dot {
        background: var(--accent);
        animation: demo-live-pulse 1.1s ease-in-out infinite;
      }

      @keyframes demo-live-pulse {
        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }
        50% {
          opacity: 0.45;
          transform: scale(0.92);
        }
      }

      .demo-live-status--loading .demo-live-status__dot {
        background: #d4a017;
        box-shadow: 0 0 8px #d4a01744;
      }

      .demo-live-status--live .demo-live-status__dot {
        background: var(--success);
        box-shadow: 0 0 8px #1d9e7555;
      }

      .demo-live-status--connected .demo-live-status__dot {
        background: var(--accent-dim);
      }

      .demo-live-status--error .demo-live-status__text {
        color: #f0a8a7;
      }

      .demo-live-status--loading .demo-live-status__text {
        color: #e8c96a;
      }

      .demo-live-status--live .demo-live-status__text {
        color: #7ee0b8;
      }

      .demo-live-status--connected .demo-live-status__text {
        color: var(--muted);
      }

      .demo-tbtn--mute .demo-tbtn__vol-off {
        display: none;
      }

      .demo-tbtn--mute[data-muted="true"] .demo-tbtn__vol-on {
        display: none;
      }

      .demo-tbtn--mute[data-muted="true"] .demo-tbtn__vol-off {
        display: block;
      }

      .demo-tbtn--mute[data-muted="true"] {
        color: var(--accent);
        background: #2a9fff10;
      }

      #demo-volume {
        flex: 1 1 72px;
        width: 72px;
        max-width: 140px;
        height: 4px;
        border-radius: 2px;
        appearance: none;
        background: linear-gradient(90deg, var(--accent-dim), var(--accent));
        opacity: 0.88;
        cursor: pointer;
      }

      #demo-volume::-webkit-slider-thumb {
        appearance: none;
        width: 13px;
        height: 13px;
        border-radius: 50%;
        background: var(--text);
        border: 2px solid var(--accent);
        box-shadow: 0 0 6px var(--border-glow);
        cursor: pointer;
      }

      .demo-volume-label {
        font-family: var(--mono);
        font-size: 11px;
        color: var(--muted);
        width: 1.75rem;
        text-align: right;
        flex-shrink: 0;
      }

      /* --- MoQ player: <moq-watch> only + demo chrome --- */
      #demo-moq-player {
        max-width: 960px;
        margin: 0 auto 2rem;
        padding: 1.25rem 1.25rem 1.5rem;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        box-shadow:
          0 0 0 1px #00000040,
          0 24px 48px #00000055;
      }

      #demo-moq-player moq-discover {
        display: block;
      }

      #demo-moq-player moq-watch {
        display: block;
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid var(--border);
        background: #000;
        box-shadow: inset 0 0 0 1px #ffffff08;
      }

      #demo-moq-player moq-watch canvas {
        display: block;
        width: 100%;
        height: auto;
      }

      #demo-moq-player #demo-watch-quality {
        margin-top: 1rem;
        width: 100%;
      }

      #demo-moq-player #demo-watch-quality .watch-ui__quality-label {
        font-family: var(--sans);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--muted);
      }

      #demo-moq-player #demo-watch-quality .watch-ui__quality-select {
        font-family: var(--mono);
        font-size: 12px;
        background: #0a0d12;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 0.35rem 0.55rem;
      }

      #demo-moq-player #demo-watch-quality .watch-ui__quality-select:hover {
        border-color: var(--accent-dim);
      }

    </style>
  </head>

  <body>
    <moq-watch-support show="always"></moq-watch-support>

    <section id="demo-moq-player" aria-label="MoQ live player">
      <moq-discover>
        <moq-watch
          id="watch"
          url="%VITE_RELAY_URL%"
          name="bbb"
          muted
          latency="real-time"
          reload
        >
          <canvas style="width: 100%; height: auto"></canvas>
        </moq-watch>
      </moq-discover>
      <div class="demo-player-chrome" role="region" aria-label="Player controls">
        <div class="demo-player-chrome__inner">
          <div
            id="demo-live-status"
            class="demo-live-status demo-live-status--connecting"
            role="status"
            aria-live="polite"
          >
            <span class="demo-live-status__dot" aria-hidden="true"></span>
            <span id="demo-live-status-text" class="demo-live-status__text">Connecting…</span>
          </div>
          <div class="demo-player-chrome__rail" role="toolbar" aria-label="Playback and audio">
            <button type="button" class="demo-tbtn demo-tbtn--play" id="demo-transport-play" aria-label="Play">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M8 5v14l11-7z" />
              </svg>
            </button>
            <button type="button" class="demo-tbtn demo-tbtn--pause" id="demo-transport-pause" aria-label="Pause">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
            </button>
            <button type="button" class="demo-tbtn demo-tbtn--stop" id="demo-transport-stop" aria-label="Stop">
              <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M6 6h12v12H6z" />
              </svg>
            </button>
            <span class="demo-player-chrome__divider" aria-hidden="true"></span>
            <button
              type="button"
              class="demo-tbtn demo-tbtn--mute"
              id="demo-transport-mute"
              aria-label="Unmute"
              aria-pressed="true"
              data-muted="true"
            >
              <svg class="demo-tbtn__vol-on" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M11 5 6 9H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2l5 4V5Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path
                  d="M15.54 8.46a5 5 0 0 1 0 7.07M19.07 4.93a10 10 0 0 1 0 14.14"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
              </svg>
              <svg class="demo-tbtn__vol-off" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M11 5 6 9H4a2 2 0 0 0-2 2v2a2 2 0 0 0 2 2h2l5 4V5Z"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <line x1="23" y1="9" x2="17" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
                <line x1="17" y1="9" x2="23" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
            <input
              id="demo-volume"
              type="range"
              min="0"
              max="100"
              value="100"
              aria-label="Volume"
              aria-valuemin="0"
              aria-valuemax="100"
            />
            <span id="demo-volume-label" class="demo-volume-label" aria-hidden="true">100</span>
            <span class="demo-player-chrome__divider" aria-hidden="true"></span>
            <button
              type="button"
              class="demo-tbtn demo-tbtn--fs"
              id="demo-transport-fs"
              aria-label="Enter fullscreen"
              data-fs="false"
            >
              <svg class="demo-tbtn__fs-enter" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg class="demo-tbtn__fs-exit" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </button>
          </div>
        </div>
      </div>
      <div id="demo-watch-quality" class="demo-watch-quality" aria-label="Quality"></div>
    </section>

    <hr />

    <h3>Uploaded videos</h3>

    <input id="video-file" type="file" accept="video/*" />

    <div class="upload-row">
      <button id="upload-pick-btn">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="17 8 12 3 7 8" />
          <line x1="12" y1="3" x2="12" y2="15" />
        </svg>
        <span id="pick-file-name">Choose video…</span>
      </button>

      <button id="video-upload">
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <polyline points="16 16 12 12 8 16" />
